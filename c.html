<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      padding: 12px;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    .wrap {
      max-width: 420px;
      margin: 0 auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    td {
      border: 1px solid #ccc;
      text-align: center;
      padding: 10px 6px;
      font-size: 18px;
      word-break: keep-all;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      padding: 14px 8px;
    }

    .count {
      font-size: 32px;
      font-weight: bold;
    }

    .emoji {
      font-size: 34px;
    }

    @media (max-width: 480px) {
      body {
        padding: 8px;
      }

      td {
        font-size: 16px;
        padding: 8px 4px;
      }

      .title {
        font-size: 20px;
      }

      .count {
        font-size: 28px;
      }

      .emoji {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <table id="sheetTable"></table>
  </div>

  <script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5USKZK-uEC6ayiKOzSLU9cCu-Mka_irBI-ihD5wJ3f7TNl9j_wDF4N1Wv63qbJNBGDoXQhC1Lf6ZG/pub?output=csv";

    fetch(sheetUrl)
      .then(res => res.text())
      .then(csv => {
        const rows = csv.trim().split("\n").map(row =>
          row.split(",").map(cell => cell.replace(/^"|"$/g, "").trim())
        );

        const table = document.getElementById("sheetTable");

        rows.forEach((row, rowIndex) => {
          const tr = document.createElement("tr");

          row.forEach((cell, colIndex) => {
            const td = document.createElement("td");
            td.textContent = cell;

            if (rowIndex === 0) td.className = "title";
            if (colIndex === 1 && rowIndex > 0) td.classList.add("count");
            if (colIndex === 3 && rowIndex > 0) td.classList.add("emoji");

            tr.appendChild(td);
          });

          table.appendChild(tr);
        });
      });
  </script>
</body>
</html>
